name: vantage-ai
version: "1.0"

services:
  - name: baseten
    dns_aliases:
      - inference.baseten.co
  - name: you_com
    dns_aliases:
      - api.you.com
  - name: cartesia
    dns_aliases:
      - api.cartesia.ai
  - name: edgar
    dns_aliases:
      - data.sec.gov
      - efts.sec.gov
      - www.sec.gov

actor:
  channels:
    - type: http
      url: http://localhost:8000
      method: POST
      headers:
        Content-Type: application/json
      request:
        message_field: company
        session_field: session_id
      response:
        type: json
        message_field: report.strategic_summary

agent:
  code_path: /agent
  entry_point: uvicorn backend.main:app --host 0.0.0.0 --port 8000
  port: 8000
  environment:
    DEMO_MODE: "false"

scenarios:
  - name: "Public company — happy path"
    description: "Should return a full cited report for a well-known public company"
    endpoint: POST /analyze
    input:
      company: "Salesforce"
      mode: "first_look"
    checks:
      - type: response_contains_field
        field: report.company_name
      - type: response_contains_field
        field: report.risk_scores
      - type: response_contains_field
        field: report.citations
      - type: response_time_ms
        max: 120000

  - name: "Private company — graceful fallback"
    description: "Should still return a report using web data, noting no SEC filings"
    endpoint: POST /analyze
    input:
      company: "Stripe"
      mode: "first_look"
    checks:
      - type: response_contains_field
        field: report.company_name
      - type: response_contains_text
        text: "private"
        field: report.financial_health.source

  - name: "Unknown company — no hallucination"
    description: "Should not invent data for a fake company"
    endpoint: POST /analyze
    input:
      company: "XYZ999FakeCompanyThatDoesNotExist"
      mode: "first_look"
    checks:
      - type: does_not_hallucinate_financials
      - type: response_time_ms
        max: 120000

  - name: "Head to Head — two public companies"
    description: "Should compare Salesforce and HubSpot with a clear recommendation"
    endpoint: POST /head-to-head
    input:
      company_a: "Salesforce"
      company_b: "HubSpot"
    checks:
      - type: response_contains_field
        field: comparison.recommendation
      - type: response_time_ms
        max: 180000

  - name: "Health check"
    description: "Health endpoint should always respond"
    endpoint: GET /health
    checks:
      - type: status_code
        expected: 200
      - type: response_contains_field
        field: status
