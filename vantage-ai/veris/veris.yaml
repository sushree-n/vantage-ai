name: vantage-ai
version: "1.0"
entrypoint: backend/main.py
framework: fastapi

scenarios:
  - name: "Public company — happy path"
    description: "Should return a full cited report for a well-known public company"
    endpoint: POST /analyze
    input:
      company: "Salesforce"
      mode: "first_look"
    checks:
      - type: response_contains_field
        field: report.company_name
      - type: response_contains_field
        field: report.risk_scores
      - type: response_contains_field
        field: report.citations
      - type: min_citations
        min: 2
      - type: response_time_ms
        max: 120000   # 2 minutes max

  - name: "Private company — graceful fallback"
    description: "Should still return a report using web data, noting no SEC filings"
    endpoint: POST /analyze
    input:
      company: "Stripe"
      mode: "first_look"
    checks:
      - type: response_contains_field
        field: report.company_name
      - type: response_contains_text
        text: "private"
        field: report.financial_health.source

  - name: "Unknown company — no hallucination"
    description: "Should not invent data for a fake company"
    endpoint: POST /analyze
    input:
      company: "XYZ999FakeCompanyThatDoesNotExist"
      mode: "first_look"
    checks:
      - type: does_not_hallucinate_financials
      - type: response_time_ms
        max: 120000

  - name: "Head to Head — two public companies"
    description: "Should compare Salesforce and HubSpot with a clear recommendation"
    endpoint: POST /head-to-head
    input:
      company_a: "Salesforce"
      company_b: "HubSpot"
    checks:
      - type: response_contains_field
        field: comparison.recommendation
      - type: response_contains_field
        field: comparison.overall_threat
      - type: response_time_ms
        max: 180000   # 3 minutes for two company lookups

  - name: "Weekly digest — multiple companies"
    description: "Should generate a digest with severity signals"
    endpoint: POST /digest
    input:
      companies: ["Salesforce", "HubSpot", "Zendesk"]
    checks:
      - type: response_contains_field
        field: digest.signals
      - type: response_contains_field
        field: digest.recommended_action
      - type: min_signals
        min: 2

  - name: "You.com API failure injection"
    description: "Should still return partial report if web search fails"
    inject_failure:
      tool: search_web
      error: timeout
    endpoint: POST /analyze
    input:
      company: "HubSpot"
    checks:
      - type: partial_report_returned
      - type: failure_noted_gracefully

  - name: "EDGAR API failure injection"
    description: "Should still return report using web data if EDGAR fails"
    inject_failure:
      tool: search_filings
      error: connection_error
    endpoint: POST /analyze
    input:
      company: "Salesforce"
    checks:
      - type: partial_report_returned
      - type: response_contains_text
        text: "N/A"
        field: report.financial_health.source

  - name: "Demo mode — instant cache response"
    description: "Demo mode should serve cached data instantly"
    endpoint: POST /analyze
    input:
      company: "Salesforce"
      demo: true
    checks:
      - type: response_time_ms
        max: 1000    # Must be instant
      - type: response_contains_field
        field: report

  - name: "Health check"
    description: "Health endpoint should always respond"
    endpoint: GET /health
    checks:
      - type: status_code
        expected: 200
      - type: response_contains_field
        field: status
