plan_dispatch:
  description: >
    You are planning sub-agent dispatch for a competitive-intelligence request.


    ## User transcript

    """{transcript}"""


    ## Your job

    1. Classify the intent as one of:
       - `first_look`      — single company deep-dive (default when one company is mentioned)
       - `head_to_head`    — comparison of two (or more) companies ("compare X and Y", "X vs Y")
       - `digest`          — weekly/recent update across a list of companies
       - `clarify`         — transcript is too vague or lacks any company entity

    2. Resolve company entities. The transcript may contain STT errors
       ("sale force" → "Salesforce", "hub spot" → "HubSpot"). Fix them.

    3. For each resolved company, emit an `edgar_queries` entry IF the
       company is a known US-listed public company. Known tickers:
       {known_tickers}. For private / unknown companies, set `ticker: null`,
       `is_public: false`, and do NOT emit an edgar_queries entry for them.

    4. Emit 3-6 targeted `web_queries` across relevant categories (news,
       pricing, product, hiring, reviews, funding, exec_moves, comparison).
       Scope queries to what the user actually asked about — do not fire
       generic queries when the user asked about a specific angle.

    5. Set `timeframe_days`: 90 by default, 7 for `digest` intent, 365 if
       the user says "over the past year", etc.

    6. Set `priority_fields` to the report fields the user emphasized.
       Examples: "pricing" → ["pricing_signals"], "who runs it" →
       ["key_executives"], "are they hiring" → ["hiring_trends"]. Empty list
       if unspecified.

    7. Write a one-sentence `normalized_query` restating the request.

    8. If intent is `clarify`, set `needs_clarification: true` and populate
       `clarification_prompt` with a short spoken question to route back
       through VoiceRun TTS (e.g. "Which competitor would you like me to
       look at?"). Leave `companies`, `edgar_queries`, `web_queries` empty
       in that case.


    ## Hard rules

    - NEVER fabricate a ticker. If you don't know one from the list above, set it to null.
    - NEVER fabricate a company. If the user said a fake or unparseable name, return intent `clarify`.
    - Return ONLY a valid JSON object matching the OrchestratorResponse schema.
    - No markdown fences. No preamble. No trailing commentary.


    ## Examples


    ### Example 1 — First look, public company

    Transcript: "give me a diligence report on Salesforce"

    {{
      "plan": {{
        "intent": "first_look",
        "companies": [{{"name": "Salesforce", "ticker": "CRM", "is_public": true}}],
        "edgar_queries": [
          {{"company": "Salesforce", "ticker": "CRM", "filing_types": ["10-K", "10-Q"], "focus": "revenue, risk factors, recent material events"}}
        ],
        "web_queries": [
          {{"query": "Salesforce recent news 2026", "category": "news"}},
          {{"query": "Salesforce product launches 2026", "category": "product"}},
          {{"query": "Salesforce executive changes 2026", "category": "exec_moves"}},
          {{"query": "Salesforce G2 customer reviews", "category": "reviews"}}
        ],
        "timeframe_days": 90,
        "priority_fields": []
      }},
      "normalized_query": "Full competitive diligence brief on Salesforce.",
      "needs_clarification": false,
      "clarification_prompt": null
    }}


    ### Example 2 — Head-to-head with pricing focus (STT garble tolerated)

    Transcript: "compair sale force and hub spot on pricing"

    {{
      "plan": {{
        "intent": "head_to_head",
        "companies": [
          {{"name": "Salesforce", "ticker": "CRM", "is_public": true}},
          {{"name": "HubSpot", "ticker": "HUBS", "is_public": true}}
        ],
        "edgar_queries": [
          {{"company": "Salesforce", "ticker": "CRM", "filing_types": ["10-K", "10-Q"], "focus": "pricing power, revenue segments"}},
          {{"company": "HubSpot", "ticker": "HUBS", "filing_types": ["10-K", "10-Q"], "focus": "pricing power, revenue segments"}}
        ],
        "web_queries": [
          {{"query": "Salesforce pricing changes 2026", "category": "pricing"}},
          {{"query": "HubSpot pricing tiers 2026", "category": "pricing"}},
          {{"query": "Salesforce vs HubSpot pricing comparison", "category": "comparison"}},
          {{"query": "HubSpot customer reviews G2 pricing complaints", "category": "reviews"}}
        ],
        "timeframe_days": 90,
        "priority_fields": ["pricing_signals", "customer_sentiment"]
      }},
      "normalized_query": "Head-to-head comparison of Salesforce and HubSpot focused on pricing.",
      "needs_clarification": false,
      "clarification_prompt": null
    }}


    ### Example 3 — Private company, no EDGAR dispatch

    Transcript: "tell me about Anthropic"

    {{
      "plan": {{
        "intent": "first_look",
        "companies": [{{"name": "Anthropic", "ticker": null, "is_public": false}}],
        "edgar_queries": [],
        "web_queries": [
          {{"query": "Anthropic recent news 2026", "category": "news"}},
          {{"query": "Anthropic funding round 2026", "category": "funding"}},
          {{"query": "Anthropic Claude product launches 2026", "category": "product"}},
          {{"query": "Anthropic hiring plans engineering", "category": "hiring"}}
        ],
        "timeframe_days": 90,
        "priority_fields": []
      }},
      "normalized_query": "Full competitive diligence brief on Anthropic (private company).",
      "needs_clarification": false,
      "clarification_prompt": null
    }}


    ### Example 4 — Digest

    Transcript: "what happened this week at Salesforce, HubSpot, and Zendesk"

    {{
      "plan": {{
        "intent": "digest",
        "companies": [
          {{"name": "Salesforce", "ticker": "CRM", "is_public": true}},
          {{"name": "HubSpot", "ticker": "HUBS", "is_public": true}},
          {{"name": "Zendesk", "ticker": null, "is_public": false}}
        ],
        "edgar_queries": [],
        "web_queries": [
          {{"query": "Salesforce news this week", "category": "news"}},
          {{"query": "HubSpot news this week", "category": "news"}},
          {{"query": "Zendesk news this week", "category": "news"}}
        ],
        "timeframe_days": 7,
        "priority_fields": []
      }},
      "normalized_query": "Weekly competitive digest for Salesforce, HubSpot, and Zendesk.",
      "needs_clarification": false,
      "clarification_prompt": null
    }}


    ### Example 5 — Ambiguous, needs clarification

    Transcript: "tell me about companies"

    {{
      "plan": {{
        "intent": "clarify",
        "companies": [],
        "edgar_queries": [],
        "web_queries": [],
        "timeframe_days": 90,
        "priority_fields": []
      }},
      "normalized_query": "Ambiguous request — no company named.",
      "needs_clarification": true,
      "clarification_prompt": "Which competitor would you like me to look into?"
    }}


    Now produce the JSON for the transcript above.
  expected_output: >
    A single OrchestratorResponse JSON object with a valid DispatchPlan.
    No prose, no markdown fences.
  agent: planner
